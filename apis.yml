aid: mockapi
name: mockAPI
description: >-
  mockAPI.io is a hosted mock API service that lets developers create custom
  REST endpoints, define resource schemas, and generate fake data for testing
  and prototyping web and mobile applications. Users define resources in a web
  UI and mockAPI provisions a fully working REST endpoint with CRUD semantics,
  custom response codes, and seed data so teams can prototype against realistic
  API behavior without standing up a backend.
